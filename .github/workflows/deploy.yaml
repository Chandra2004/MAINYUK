name: Deploy to InfinityFree

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Zip & FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env file
        env:
          ENV_PROD_EXTRAS: ${{ secrets.ENV_PROD_EXTRAS }}
        run: |
          printf "%s\n" "$ENV_PROD_EXTRAS" > .env

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          
      - name: Install Composer Dependencies
        run: composer install --optimize-autoloader --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Frontend Assets
        run: npm run build

      - name: Clean up unused files
        run: |
          # Menghapus file/folder yang tidak perlu diupload
          rm -rf node_modules
          rm -rf .git
          rm -rf .github
          rm -rf tests

      - name: Create unzip.php
        run: |
          cat << 'EOF' > unzip.php
          <?php
          $zips = glob('chunk_*.zip');
          if (empty($zips)) {
              echo "NO_ZIPS_FOUND";
              exit;
          }

          $successCount = 0;
          foreach ($zips as $file) {
              $zip = new ZipArchive;
              if ($zip->open($file) === TRUE) {
                  $zip->extractTo(__DIR__);
                  $zip->close();
                  unlink($file);
                  $successCount++;
              } else {
                  echo "FAILED_TO_EXTRACT_$file\n";
              }
          }
          echo "EXTRACTION_SUCCESS ($successCount files)";
          unlink(__FILE__);
          ?>
          EOF

      - name: Split project into small ZIP chunks
        run: |
          python3 -c "
          import os
          import zipfile

          MAX_SIZE = 8 * 1024 * 1024 # 8 MB max per file untuk bypass limit InfinityFree

          chunk_index = 1
          current_size = 0
          current_zip = None

          def new_zip():
              global chunk_index, current_size, current_zip
              if current_zip:
                  current_zip.close()
              current_zip = zipfile.ZipFile(f'chunk_{chunk_index}.zip', 'w', zipfile.ZIP_DEFLATED)
              chunk_index += 1
              current_size = 0

          new_zip()

          for root, dirs, files in os.walk('.'):
              if 'chunk_' in root or '.git' in root or 'node_modules' in root:
                  continue
              for file in files:
                  if file.startswith('chunk_') and file.endswith('.zip'): continue
                  filepath = os.path.join(root, file)
                  filesize = os.path.getsize(filepath)
                  
                  if current_size + filesize > MAX_SIZE and current_size > 0:
                      new_zip()
                      
                  current_zip.write(filepath, filepath)
                  current_size += filesize

          if current_zip:
              current_zip.close()
          "

      - name: Upload files via FTP (cURL)
        run: |
          # Upload file chunk zip satu per satu
          for zipfile in chunk_*.zip; do
            echo "Uploading $zipfile..."
            curl -T "$zipfile" ftp://${{ secrets.FTP_SERVER }}/mainyuk.ct.ws/htdocs/"$zipfile" --user ${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}
          done
          
          echo "Uploading unzip.php..."
          curl -T unzip.php ftp://${{ secrets.FTP_SERVER }}/mainyuk.ct.ws/htdocs/unzip.php --user ${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}

      - name: Trigger Unzip on Server
        run: |
          echo "Memicu proses unzip di server..."
          curl -s -o response.txt http://mainyuk.ct.ws/unzip.php || true
          cat response.txt || true
          
          if [ -f response.txt ] && grep -q "EXTRACTION_SUCCESS" response.txt; then
            echo -e "\n\n🚀 Deployment Berhasil dan file sudah terekstrak di server!"
          else
            echo -e "\n\n⚠️ Ekstraksi otomatis dicegat oleh keamanan InfinityFree (Error 52)."
            echo "Tidak masalah! File zip Anda sudah 100% ter-upload."
            echo "========================================================================"
            echo "👉 SILAKAN KLIK LINK INI DARI BROWSER ANDA UNTUK MENYELESAIKAN DEPLOY:"
            echo "🌐 http://mainyuk.ct.ws/unzip.php"
            echo "========================================================================"
          fi
