name: Deploy to CPanel/Shared Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚡ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, pdo, pdo_mysql, gd, zip
          coverage: none

      - name: 📦 Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🛠️ Install NPM Dependencies and Build Assets
        run: |
          npm ci || npm install
          npm run build

      - name: 🎨 Publish Package Assets (Webartisan)
        run: |
          php artisan vendor:publish --tag=webartisan-assets --force --no-interaction

      - name: 📁 Prepare Storage & Cleanup Garbage
        run: |
          # Create required storage structure inside build
          mkdir -p storage/framework/{sessions,views,cache}
          mkdir -p storage/logs

          # REMOVE GARBAGE (To speed up deployment)
          rm -rf docker
          rm -rf stubs
          rm -f sail
          rm -rf public/vendor/blade-lucide-icons

          # CLEAR CACHE FILES
          rm -f bootstrap/cache/*.php

      - name: 🔐 Create .env file
        env:
          ENV_PROD_EXTRAS: ${{ secrets.ENV_PROD_EXTRAS }}
        run: |
          printf '%s\n' "$ENV_PROD_EXTRAS" >> .env

      - name: Sync files to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: mainyuk.ct.ws/htdocs/
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/phpunit.xml
            **/.env.example
            **/README.md
            **/package.json
            **/package-lock.json
            **/vite.config.js
