name: Deploy to CPanel/Shared Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚡ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, pdo, pdo_mysql, gd, zip
          coverage: none

      - name: 📦 Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🛠️ Install NPM Dependencies and Build Assets
        run: |
          npm ci || npm install
          npm run build

      - name: 🎨 Publish Package Assets (Webartisan)
        run: |
          php artisan vendor:publish --tag=webartisan-assets --force --no-interaction

      - name: 📁 Prepare Storage & Cleanup Garbage
        run: |
          # Create required storage structure inside build
          mkdir -p storage/framework/{sessions,views,cache}
          mkdir -p storage/logs
          mkdir -p storage/app/uploads/{profiles,ktp_documents,akta_documents,kk_documents}
          touch storage/framework/sessions/.gitkeep
          touch storage/framework/views/.gitkeep
          touch storage/framework/cache/.gitkeep
          touch storage/logs/.gitkeep
          touch storage/app/uploads/profiles/.gitkeep
          touch storage/app/uploads/ktp_documents/.gitkeep
          touch storage/app/uploads/akta_documents/.gitkeep
          touch storage/app/uploads/kk_documents/.gitkeep

          # REMOVE GARBAGE (To shrink ZIP size)
          rm -rf docker
          rm -rf stubs
          rm -f sail
          rm -rf public/vendor/blade-lucide-icons

          # CLEAR CACHE FILES
          rm -f bootstrap/cache/*.php

      - name: 🔐 Create .env file
        env:
          ENV_PROD_EXTRAS: ${{ secrets.ENV_PROD_EXTRAS }}
        run: |
          printf '%s\n' "$ENV_PROD_EXTRAS" >> .env

      - name: 🗜️ Zip and Prepare for FTP
        run: |
          # Buat folder khusus agar FTP hanya mengunggah file ZIP saja
          mkdir deploy-dist

          # Compress semua project menjadi satu file deploy.zip di dalam folder deploy-dist
          zip -r deploy-dist/deploy.zip . -x "node_modules/*" "tests/*" ".git*" ".github*" "deploy-dist/*"

          # Buat script unzip.php untuk dieksekusi di server hosting
          cat << 'EOF' > deploy-dist/unzip.php
          <?php
          ini_set('max_execution_time', 600);
          set_time_limit(600);
          ignore_user_abort(true);

          $zipFile = 'deploy.zip';
          if (file_exists($zipFile)) {
              $zip = new ZipArchive;
              if ($zip->open($zipFile) === TRUE) {
                  $zip->extractTo(__DIR__);
                  $zip->close();
                  unlink($zipFile);
                  unlink(__FILE__);
                  echo "SUCCESS: Extraction complete.";
              } else {
                  echo "ERROR: Failed to open zip archive.";
              }
          } else {
              echo "ERROR: Zip file not found.";
          }
          EOF

      - name: Sync ZIP file to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: mainyuk.ct.ws/htdocs/
          # Kita arahkan ke folder deploy-dist agar HANYA file deploy.zip dan unzip.php yang di-upload
          local-dir: ./deploy-dist/
          dangerous-clean-slate: false

      - name: 🚀 Trigger Unzip and Poll for Completion
        run: |
          echo "Triggering unzip.php..."
          # Kirim request trigger, abaikan jika koneksi terputus prematur (curl exit 52 atau timeout)
          curl -s -m 15 "http://mainyuk.ct.ws/unzip.php" || true
          
          # Lakukan polling untuk memeriksa apakah unzip.php sudah selesai mengekstrak dan menghapus dirinya sendiri
          echo "Waiting for extraction to complete..."
          for i in {1..20}; do
            status_code=$(curl -o /dev/null -s -w "%{http_code}" "http://mainyuk.ct.ws/unzip.php")
            echo "Check $i: unzip.php HTTP status is $status_code"
            if [ "$status_code" -eq 404 ]; then
              echo "SUCCESS: Extraction complete (unzip.php successfully cleaned up)."
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: Extraction timed out or failed."
          exit 1
